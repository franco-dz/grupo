<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediTurnos - Login Paciente</title>

    <!-- Conecta este HTML con su CSS propio -->
    <link rel="stylesheet" href="../styles/login-paciente.css">
</head>
<body>

    <!-- HEADER: Menú simple para volver al inicio -->
    <header class="login-paciente-header">
        <div class="login-paciente-logo">MediTurnos</div>
        <a href="../index.html">Volver al inicio</a>
    </header>

    <!-- MAIN: Contenido principal del login del paciente -->
    <main class="login-paciente-main">

        <!-- TARJETA DE LOGIN: Caja central con el formulario -->
        <section class="login-paciente-tarjeta">
            <h1>Ingreso de paciente</h1>
            <p>Ingresá con tu DNI y contraseña para gestionar tus turnos.</p>

            <!-- FORMULARIO: Maqueta visual, no guarda datos porque no tiene JavaScript ni backend -->
            <form>
                <!-- Campo para DNI -->
                <label for="dni">DNI</label>
                <input type="text" id="dni" name="dni" placeholder="Ejemplo: 12345678">

                <!-- Campo para contraseña -->
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Ingresá tu contraseña">

                <!-- Botón que simula el ingreso y lleva al panel del paciente -->
                <a class="login-paciente-boton" href="#">Ingresar</a>
            </form>

            <!-- Enlace para pacientes que todavía no tienen cuenta -->
            <p class="login-paciente-texto-final">
                ¿No tenés cuenta?
                <a href="registro-paciente.html">Crear cuenta paciente</a>
            </p>
        </section>

    </main>

</body>
</html>
